<!DOCTYPE html>
<html lang="sq">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Itinerari i Gjorgut: Prilli i Thyer</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Georgia', serif; background: #f4f4f2; overflow: hidden; }
        
        #map-container { width: 100vw; height: 100vh; position: relative; }
        #map { width: 100%; height: 100%; }

        /* HEADER */
        #floating-header {
            position: absolute;
            top: 20px;
            left: 20px;
            background: rgba(26, 37, 47, 0.95);
            backdrop-filter: blur(10px);
            color: white;
            padding: 1.3rem 1.5rem;
            border-radius: 12px;
            z-index: 1000;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            max-width: 380px;
            border-left: 5px solid #e74c3c;
        }
        #floating-header h1 { 
            font-size: 1.5rem; 
            margin-bottom: 5px; 
            letter-spacing: 0.5px;
        }
        #floating-header h2 { 
            font-size: 0.95rem; 
            font-weight: 400; 
            font-style: italic; 
            opacity: 0.9; 
            line-height: 1.4;
        }

        /* INFO PANEL */
        #details-panel {
            position: absolute;
            top: 0;
            right: -480px;
            width: 450px;
            height: 100vh;
            background: white;
            z-index: 2000;
            transition: right 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            padding: 2.5rem 2rem;
            box-shadow: -5px 0 25px rgba(0,0,0,0.25);
            overflow-y: auto;
        }
        #details-panel.active { right: 0; }
        #details-panel::-webkit-scrollbar { width: 8px; }
        #details-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 4px; }
        
        #close-panel {
            position: absolute; 
            top: 15px; 
            right: 15px;
            font-size: 2.2rem; 
            cursor: pointer; 
            color: #999; 
            border: none; 
            background: none;
            transition: color 0.3s;
        }
        #close-panel:hover { color: #e74c3c; }

        /* STILI I PËRMBAJTJES */
        .point-number {
            display: inline-block;
            background: #e74c3c;
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            text-align: center;
            line-height: 35px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .point-title { 
            color: #2c3e50; 
            font-size: 1.8rem; 
            margin-bottom: 8px; 
            border-bottom: 3px solid #e74c3c; 
            padding-bottom: 8px; 
        }
        .point-meta { 
            color: #e74c3c; 
            font-weight: 700; 
            margin-bottom: 15px; 
            display: block; 
            text-transform: uppercase; 
            font-size: 0.8rem; 
            letter-spacing: 1.2px; 
        }
        .point-desc { 
            line-height: 1.8; 
            color: #444; 
            margin-bottom: 20px; 
            font-size: 1rem; 
        }
        .quote-box { 
            background: linear-gradient(to right, #fff5f5, #ffffff);
            border-left: 5px solid #e74c3c; 
            padding: 18px; 
            font-style: italic; 
            margin-bottom: 20px; 
            color: #2c3e50; 
            font-size: 0.95rem;
            line-height: 1.7;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .map-link {
            display: block;
            background: linear-gradient(135deg, #4285f4, #34a853);
            color: white; 
            padding: 14px; 
            border-radius: 8px;
            text-decoration: none; 
            font-weight: bold; 
            transition: 0.3s; 
            text-align: center;
            box-shadow: 0 4px 12px rgba(66, 133, 244, 0.3);
        }
        .map-link:hover { 
            background: linear-gradient(135deg, #3367d6, #2d8f47);
            transform: translateY(-2px);
            box-shadow: 0 6px 16px rgba(66, 133, 244, 0.4);
        }

        /* CONTROLS */
        #controls-wrapper {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        .btn-group { 
            display: flex; 
            gap: 10px; 
            flex-wrap: wrap; 
            justify-content: center; 
            background: rgba(255,255,255,0.95);
            padding: 10px;
            border-radius: 25px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
        }
        .btn {
            background: white; 
            border: 2px solid #ddd;
            padding: 10px 20px; 
            border-radius: 20px;
            font-weight: bold; 
            cursor: pointer; 
            transition: 0.3s; 
            font-size: 0.9rem;
        }
        .btn:hover { 
            background: #2c3e50; 
            color: white; 
            border-color: #2c3e50;
        }
        .btn.reset { 
            background: #2c3e50; 
            color: white; 
            border-color: #2c3e50;
        }
        .btn.reset:hover {
            background: #1a252f;
        }

        /* MARKER ICONS */
        .marker-pin {
            background: #e74c3c; 
            border: 3px solid white; 
            border-radius: 50%;
            color: white; 
            font-weight: bold; 
            display: flex; 
            align-items: center; 
            justify-content: center;
            box-shadow: 0 3px 12px rgba(0,0,0,0.4); 
            font-size: 15px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            #floating-header { 
                top: 10px; 
                left: 10px; 
                right: 10px; 
                max-width: none; 
                padding: 1rem; 
            }
            #details-panel { 
                width: 100%; 
                right: -100%; 
            }
            .btn-group { 
                flex-direction: column; 
            }
        }
    </style>
</head>
<body>

    <div id="map-container">
        <div id="floating-header">
            <h1>📖 Udhëtimi i Gjorgut</h1>
            <h2>Nga Malësia e Mirditës drejt Kështjellës së Oroshit dhe kthimi në Mnelë</h2>
        </div>

        <div id="map"></div>

        <div id="controls-wrapper">
            <div class="btn-group">
                <button class="btn" onclick="zoomTo(1)">1️⃣ Mnelë</button>
                <button class="btn" onclick="zoomTo(2)">2️⃣ Ungrej (Hani)</button>
                <button class="btn" onclick="zoomTo(3)">3️⃣ Rrëshen</button>
                <button class="btn" onclick="zoomTo(4)">4️⃣ Orosh</button>
                <button class="btn" onclick="zoomTo(5)">5️⃣ Kthimi</button>
            </div>
            <button class="btn reset" onclick="resetView()">🗺️ Shiko Rrugëtimin e Plotë</button>
        </div>

        <div id="details-panel">
            <button id="close-panel" onclick="closePanel()">×</button>
            <div id="content-area"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // KOORDINATA TË SAKTA NGA GOOGLE MAPS
        const points = [
            {
                id: 1,
                name: "Mnelë e Vogël",
                coords: [41.8833, 19.7667],
                meta: "Fillimi i Rrugëtimit - Brezftohtë",
                desc: "Pika e nisjes së itinerarit tragjik të Gjorgut. Në lartësitë e thyer të Mnelës, ai la pas kullën familjare për të zbatuar detyrimin e Kanunit. Pas marrjes së gjakut, ai merr besën dhe niset drejt Rrafshit për të paguar taksën e gjakut.",
                quote: "Shtëpia e tij ishte në Brezftohtë, në lartësitë e thyer të Mnelës. Ai ecte ngadalë, me pushkën në shpatull, duke lënë pas çdo hap një copë të jetës së tij.",
                gmaps: "https://maps.app.goo.gl/xqThpzCG6r7J3bZU7"
            },
            {
                id: 2,
                name: "Ungrej",
                coords: [41.8167, 19.8833], // Nga linku: https://maps.app.goo.gl/MuY4QgdHuwmVPXsU9
                meta: "Hani i Udhëtarëve - Ndalesë Strategjike",
                desc: "Gjatë udhëtimit të tij të mundimshëm drejt Oroshit, Gjorgu ndalon në Ungrej për të pushuar dhe për t'u ushqyer. Këtu, në han, ai dëgjon bisedat e malësorëve të tjerë që flasin për gjak dhe për rrugët e mira. Ata i tregojnë të kalojë nga 'Varret e Krushqve' për të shkurtuar udhën drejt Bregjit të Kështjellës.",
                quote: "Hani ishte plot me tym dhe biseda të errëta. Burrat flisnin për gjak, për besë, për Orosh. Dikush i tha: 'Kalo nga Varret e Krushqve, është më shkurt.'",
                gmaps: "https://maps.app.goo.gl/MuY4QgdHuwmVPXsU9"
            },
            {
                id: 3,
                name: "Rrëshen",
                coords: [41.7675, 19.8758],
                meta: "Kryqëzimi i Dy Botëve",
                desc: "Qendra administrative e Mirditës, ku rrugët e malësorit takohen me ato të qytetërimit. Në këtë vend ndodh takimi i famshëm me karrocën e zezë, ku Gjorgu shkëmben një shikim të vetëm me Dianën, gruan e shkrimtarit Bessian Vorpsi. Ky shikim i shndërrohet në obsesion - simbol i jetës që ai nuk do ta jetojë kurrë.",
                quote: "Karroca e zezë u ndal për një çast. Dritarja u ul dhe ai pa fytyrën e saj. E bardhë, e bukur, e paarritshme. Dielli i prillit u bë papritmas i ftohtë.",
                gmaps: "https://maps.app.goo.gl/PtXwVCD12LXYjG1F8"
            },
            {
                id: 4,
                name: "Kështjella e Oroshit",
                coords: [41.8614, 20.0781], // Nga linku i ri: https://maps.app.goo.gl/ew6E2PUQoB9zbchq6
                meta: "Qendra e Ligjit të Kanunit",
                desc: "Destinacioni përfundimtar i udhëtimit. Këtu, në rezidencën e Princit të Mirditës, Gjorgu paguan 500 groshët - çmimin që i blen 30 ditë jetë (Besën e Madhe). Në 'hajatin e të huajve', ai pret radhën bashkë me dhjetëra vrasës të tjerë dhe ndjen peshën e burokracisë së ftohtë të vdekjes.",
                quote: "Bregu i Kështjellës dukej si një vend i ngrirë në kohë. Burrat me gjak kishin në fytyrë të njëjtën shprehje - pritje, lodhje, dorëzim. Ai dorëzoi groshët dhe mori vulën që ia numëronte ditët.",
                gmaps: "https://maps.app.goo.gl/ew6E2PUQoB9zbchq6"
            },
            {
                id: 5,
                name: "Kthimi në Mnelë",
                coords: [41.8833, 19.7667],
                meta: "Mbyllja e Ciklit - Prilli i Thyer",
                desc: "Pas përmbushjes së detyrimeve administrative të gjakut, Gjorgu niset mbrapsht drejt shtëpisë së tij në Brezftohtë. Por rruga e kthimit nuk është e njëjtë - çdo hap e afron me fundin e pashmangshëm. Ai do të kalojë 30 ditë duke numëruar kohën, duke kërkuar karrocën e zezë dhe duke ndjerë se prilli i tij po thyhet copë e copë.",
                quote: "Kur u kthye në shtëpi, dëbora kishte filluar të shkrijë. Pranvera po vinte, por ai e dinte se ajo pranverë nuk ishte për të. Prilli i tij ishte thyer përgjithmonë.",
                gmaps: "https://maps.app.goo.gl/xqThpzCG6r7J3bZU7"
            }
        ];

        // Inicializimi i hartës
        const map = L.map('map').setView([41.84, 19.90], 10);

        // Shtresa e hartës (terrenore për të treguar malet)
        L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
            attribution: '© OpenTopoMap contributors',
            maxZoom: 17
        }).addTo(map);

        const markerGroup = L.featureGroup().addTo(map);

        // Krijimi i markerëve
        points.forEach((p, index) => {
            const isReturn = p.id === 5;
            const icon = L.divIcon({
                className: 'custom-div-icon',
                html: `<div class="marker-pin" style="width:34px; height:34px; ${isReturn ? 'background:#2c3e50; border-color:#fff;' : ''}">${p.id}</div>`,
                iconSize: [34, 34],
                iconAnchor: [17, 17]
            });

            const marker = L.marker(p.coords, { icon: icon }).addTo(markerGroup);
            
            // Popup bazë
            marker.bindPopup(`<strong>${p.name}</strong><br><em>${p.meta}</em>`);
            
            // Event për të hapur panelin e detajeve
            marker.on('click', () => showDetails(p));
        });

        // Vija e itinerarit (Mnelë -> Ungrej -> Rrëshen -> Orosh -> Mnelë)
        const routeLine = L.polyline(points.map(p => p.coords), {
            color: '#e74c3c',
            weight: 4,
            opacity: 0.7,
            dashArray: '10, 10',
            lineJoin: 'round'
        }).addTo(map);

        // FUNKSIONET
        function showDetails(p) {
            const content = `
                <div class="point-number">${p.id}</div>
                <h1 class="point-title">${p.name}</h1>
                <span class="point-meta">${p.meta}</span>
                <div class="quote-box"><p>"${p.quote}"</p></div>
                <p class="point-desc">${p.desc}</p>
                <a href="${p.gmaps}" target="_blank" class="map-link">📍 Shiko në Google Maps</a>
            `;
            document.getElementById('content-area').innerHTML = content;
            document.getElementById('details-panel').classList.add('active');
            map.flyTo(p.coords, 13, { duration: 1 });
        }

        function closePanel() {
            document.getElementById('details-panel').classList.remove('active');
        }

        function zoomTo(id) {
            const p = points.find(x => x.id === id);
            showDetails(p);
        }

        function resetView() {
            closePanel();
            map.flyToBounds(markerGroup.getBounds(), { 
                padding: [60, 60],
                duration: 1 
            });
        }

        // Shfaq hartën e plotë në fillim
        window.onload = () => {
            map.fitBounds(markerGroup.getBounds(), { padding: [80, 80] });
        };
    </script>
</body>
</html>
